<div class="container">
    <h2>Upload Demo – CV</h2>
    <p>Aceasta este o simulare a funcției de încărcare a fișierelor.</p>

    <input type="file" id="fileInput"><br><br>

    <button onclick="uploadDemo()">Încarcă fișierul</button>

    <p id="msg" style="margin-top:20px; font-weight:bold;"></p>
</div>

<script>
function uploadDemo() {
    let file = document.getElementById("fileInput").value;
    if (!file) {
        document.getElementById("msg").innerText = "Selectează un fișier înainte de a încărca.";
        return;
    }
    document.getElementById("msg").innerText = "Fișier încărcat (DEMO) – în versiunea reală va fi salvat în portofoliu.";
}
</script>
